<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Current build themes</title>
  <desc id="desc">Four compact cards showing data foundations, AI systems, product workflows, and operations.</desc>
  <rect width="1200" height="260" rx="28" fill="#0B1120"/>
  <g transform="translate(42 42)">
    <rect width="258" height="176" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <rect x="22" y="22" width="46" height="46" rx="14" fill="#042F2E"/>
    <text x="22" y="96" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">Data Foundations</text>
    <text x="22" y="130" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">pipelines, models, quality</text>
    <text x="22" y="154" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">checks, analytics contracts</text>
  </g>
  <g transform="translate(326 42)">
    <rect width="258" height="176" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <rect x="22" y="22" width="46" height="46" rx="14" fill="#312E81"/>
    <text x="22" y="96" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">AI Systems</text>
    <text x="22" y="130" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">agents, RAG, memory, tools</text>
    <text x="22" y="154" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">local + cloud model routing</text>
  </g>
  <g transform="translate(610 42)">
    <rect width="258" height="176" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <rect x="22" y="22" width="46" height="46" rx="14" fill="#78350F"/>
    <text x="22" y="96" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">Product Workflows</text>
    <text x="22" y="130" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">interfaces, auth, forms,</text>
    <text x="22" y="154" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">dashboards, useful UX</text>
  </g>
  <g transform="translate(894 42)">
    <rect width="258" height="176" rx="22" fill="#0F172A" stroke="#1E293B"/>
    <rect x="22" y="22" width="46" height="46" rx="14" fill="#164E63"/>
    <text x="22" y="96" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="800">Ops Discipline</text>
    <text x="22" y="130" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Docker, GitHub Actions,</text>
    <text x="22" y="154" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">runbooks, PR hygiene</text>
  </g>
</svg>
