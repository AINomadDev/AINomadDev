<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pratik Thakare - Data Engineer, AI Engineer, Builder</title>
  <desc id="desc">A modern dark GitHub profile banner with data, AI, and builder positioning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.48" stop-color="#111827"/>
      <stop offset="1" stop-color="#27140A"/>
    </linearGradient>
    <linearGradient id="accent" x1="180" y1="70" x2="1020" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.45" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="soft" x="-80" y="-80" width="1360" height="580" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
