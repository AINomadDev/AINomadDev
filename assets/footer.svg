<svg width="1200" height="160" viewBox="0 0 1200 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Data AI product footer</title>
  <desc id="desc">A footer statement about building useful systems at the intersection of data, AI, and product engineering.</desc>
  <defs>
    <linearGradient id="footer" x1="0" y1="0" x2="1200" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F766E"/>
      <stop offset="0.5" stop-color="#4338CA"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="160" rx="28" fill="#0B1120"/>
  <rect x="1" y="1" width="1198" height="158" rx="27" stroke="url(#footer)" stroke-width="2"/>
  <text x="600" y="72" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">Building useful systems at the intersection of data, AI, and product.</text>
  <text x="600" y="112" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18">Reliable pipelines. Tool-using agents. Products that make complex information easier to act on.</text>
</svg>
