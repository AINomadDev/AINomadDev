    <path d="M80 138H1120" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M80 198H1120" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M80 258H1120" stroke="#E5E7EB" stroke-width="1"/>
