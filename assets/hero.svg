    <text x="2" y="88" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="25" font-weight="600">Data Engineer + AI Engineer + Builder</text>
    <text x="2" y="136" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19">I turn real data into reliable systems, then layer AI</text>
    <text x="2" y="165" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="19">workflows on top to build products people can use.</text>
