<svg width="1200" height="130" viewBox="0 0 1200 130" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Profile closing statement</title>
  <desc id="desc">A compact footer for the profile README.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6"/>
      <stop offset="0.5" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="130" rx="26" fill="#0B1120"/>
  <rect x="1" y="1" width="1198" height="128" rx="25" stroke="url(#g)" stroke-width="2"/>
  <text x="600" y="58" text-anchor="middle" fill="#F8FAFC" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="26" font-weight="850">Useful systems. Trusted data. AI that knows its tools.</text>
  <text x="600" y="91" text-anchor="middle" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">That is the kind of builder profile I am creating here.</text>
