<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated data and AI engineering workspace</title>
  <desc id="desc">A modern animated banner showing data pipelines, cloud systems, and AI workflow nodes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="line" x1="178" y1="194" x2="1018" y2="194" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .grid { stroke: #263244; stroke-width: 1; opacity: .28; }
      .panel { fill: rgba(15, 23, 42, .72); stroke: rgba(148, 163, 184, .28); stroke-width: 1.5; }
      .label { fill: #E5E7EB; font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .small { fill: #94A3B8; font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .code { fill: #CBD5E1; font: 600 17px "SFMono-Regular", Consolas, "Liberation Mono", monospace; letter-spacing: 0; }
      .line { stroke: url(#line); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 12 16; animation: dash 3.8s linear infinite; }
      .pulse { transform-origin: center; animation: pulse 2.8s ease-in-out infinite; }
      .pulse2 { transform-origin: center; animation: pulse 2.8s ease-in-out .55s infinite; }
      .pulse3 { transform-origin: center; animation: pulse 2.8s ease-in-out 1.1s infinite; }
      .float { animation: float 4.8s ease-in-out infinite; }
      .float2 { animation: float 5.4s ease-in-out .8s infinite; }
      .scan { animation: scan 3.2s ease-in-out infinite; }
      @keyframes dash { to { stroke-dashoffset: -112; } }
      @keyframes pulse { 0%, 100% { transform: scale(1); opacity: .88; } 50% { transform: scale(1.06); opacity: 1; } }
      @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes scan { 0% { transform: translateX(-150px); opacity: 0; } 15% { opacity: .65; } 85% { opacity: .65; } 100% { transform: translateX(150px); opacity: 0; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <g>
    <path class="grid" d="M0 70H1200M0 140H1200M0 210H1200M0 280H1200M0 350H1200"/>
    <path class="grid" d="M100 0V420M200 0V420M300 0V420M400 0V420M500 0V420M600 0V420M700 0V420M800 0V420M900 0V420M1000 0V420M1100 0V420"/>
  </g>

  <circle cx="960" cy="68" r="150" fill="#38BDF8" opacity=".08"/>
  <circle cx="194" cy="352" r="160" fill="#34D399" opacity=".08"/>
  <circle cx="640" cy="166" r="190" fill="#A78BFA" opacity=".07"/>

  <g class="float">
    <rect class="panel" x="70" y="72" width="310" height="248" rx="24"/>
    <text class="small" x="102" y="118">ingest</text>
    <text class="label" x="102" y="160">Data pipelines</text>
    <text class="code" x="102" y="208">airflow.schedule()</text>
    <text class="code" x="102" y="242">spark.transform()</text>
    <text class="code" x="102" y="276">warehouse.publish()</text>
    <rect x="102" y="294" width="210" height="8" rx="4" fill="#1E293B"/>
    <rect class="scan" x="102" y="294" width="82" height="8" rx="4" fill="#38BDF8"/>
  </g>

  <g class="float2">
    <rect class="panel" x="815" y="90" width="315" height="230" rx="24"/>
    <text class="small" x="847" y="136">reason</text>
    <text class="label" x="847" y="178">Grounded AI</text>
    <text class="code" x="847" y="226">tools.route()</text>
    <text class="code" x="847" y="260">rag.retrieve()</text>
    <text class="code" x="847" y="294">guardrails.check()</text>
  </g>

  <path class="line" d="M380 198C468 138 529 268 604 208C683 145 735 222 815 198"/>

  <g filter="url(#glow)">
    <circle class="pulse" cx="458" cy="171" r="18" fill="#38BDF8"/>
    <circle class="pulse2" cx="604" cy="208" r="22" fill="#A78BFA"/>
    <circle class="pulse3" cx="742" cy="205" r="18" fill="#34D399"/>
  </g>

  <g>
    <rect x="470" y="86" width="250" height="68" rx="20" fill="rgba(15, 23, 42, .64)" stroke="rgba(148, 163, 184, .24)"/>
    <text class="small" x="500" y="128">cloud data</text>
    <circle cx="675" cy="120" r="8" fill="#34D399">
      <animate attributeName="opacity" values=".35;1;.35" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <rect x="500" y="275" width="215" height="62" rx="19" fill="rgba(15, 23, 42, .64)" stroke="rgba(148, 163, 184, .24)"/>
    <text class="small" x="532" y="313">builder mode</text>
    <circle cx="674" cy="305" r="8" fill="#38BDF8">
      <animate attributeName="opacity" values=".35;1;.35" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
