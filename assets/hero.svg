    <path d="M760 50V370" stroke="#E5E7EB" stroke-width="1"/>
    <path d="M960 50V370" stroke="#E5E7EB" stroke-width="1"/>
  </g>
  <g transform="translate(74 66)">
    <rect width="460" height="288" rx="24" fill="#020617" fill-opacity="0.76" stroke="#334155"/>
    <circle cx="34" cy="34" r="7" fill="#EF4444"/>
    <circle cx="58" cy="34" r="7" fill="#F59E0B"/>
    <circle cx="82" cy="34" r="7" fill="#22C55E"/>
    <text x="34" y="88" fill="#67E8F9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">data_pipeline.run()</text>
    <text x="34" y="128" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">ingest → model → validate</text>
    <text x="34" y="168" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">agent.use_tools()</text>
    <text x="34" y="208" fill="#CBD5E1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">retrieve → reason → act</text>
    <text x="34" y="248" fill="#FCD34D" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20">ship_product()</text>
